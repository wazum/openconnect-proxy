services:
  ocserv:
    build:
      context: .
      dockerfile: ocserv.Dockerfile
    container_name: test-ocserv
    privileged: true
    environment:
      - CA_CN=Test VPN CA
      - CA_ORG=Test Org
      - CA_DAYS=365
      - SRV_CN=vpn.test.local
      - SRV_ORG=Test Org
      - SRV_DAYS=365
    networks:
      vpntest:
        aliases:
          - vpn.test.local
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 443 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  openconnect-proxy:
    build:
      context: ../../build
      dockerfile: Dockerfile
    container_name: test-openconnect-proxy
    privileged: true
    depends_on:
      ocserv:
        condition: service_healthy
    environment:
      - OPENCONNECT_URL=vpn.test.local:443
      - OPENCONNECT_USER=test
      - OPENCONNECT_PASSWORD=test
      - OPENCONNECT_OPTIONS=--servercert ${OPENCONNECT_SERVERCERT:-pin-sha256:placeholder} --protocol=anyconnect --no-dtls
      - RECONNECT_DELAY=30
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      - vpntest
    healthcheck:
      interval: 2s
      retries: 3
      start_period: 30s

  openconnect-proxy-preconnect:
    build:
      context: ../../build
      dockerfile: Dockerfile
    container_name: test-openconnect-proxy-preconnect
    privileged: true
    environment:
      - OPENCONNECT_URL=198.51.100.1:443
      - OPENCONNECT_USER=test
      - OPENCONNECT_PASSWORD=test
      - OPENCONNECT_OPTIONS=--protocol=anyconnect --no-dtls
      - RECONNECT_DELAY=5
      - TUNNEL_GATE_INTERVAL=1
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      - vpntest
    healthcheck:
      interval: 2s
      retries: 3
      start_period: 30s

  openconnect-proxy-disabled:
    build:
      context: ../../build
      dockerfile: Dockerfile
    container_name: test-openconnect-proxy-disabled
    privileged: true
    environment:
      - OPENCONNECT_URL=198.51.100.1:443
      - OPENCONNECT_USER=test
      - OPENCONNECT_PASSWORD=test
      - OPENCONNECT_OPTIONS=--protocol=anyconnect --no-dtls
      - RECONNECT_DELAY=5
      - TUNNEL_GATE=0
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      - vpntest
    healthcheck:
      interval: 2s
      retries: 3
      start_period: 30s

networks:
  vpntest:
    driver: bridge
