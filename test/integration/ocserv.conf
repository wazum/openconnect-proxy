# Minimal ocserv configuration for testing - AnyConnect protocol

auth = "plain[/etc/ocserv/ocpasswd]"

# Server settings
server-name = vpn.test.local
listen-host = 0.0.0.0
tcp-port = 443

# Certificates
server-cert = /etc/ocserv/certs/server.crt
server-key = /etc/ocserv/certs/server-key.pem

# VPN device
device = tun

# VPN network configuration
ipv4-network = 192.168.100.0
ipv4-netmask = 255.255.255.0

# Process settings
max-clients = 10
socket-file = /var/run/ocserv.sock

# Logging
log-level = 1

# Disable DTLS for simplicity in testing
dtls-legacy = false

