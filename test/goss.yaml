port:
  tcp:8888:
    listening: true
    ip:
      - 0.0.0.0
  tcp:8889:
    listening: true
    ip:
      - 0.0.0.0

process:
  tinyproxy:
    running: true
  microsocks:
    running: true

file:
  /entrypoint.sh:
    exists: true
    mode: "0755"
    filetype: file
  /etc/vpnc/vpnc-script:
    exists: true
    mode: "0755"
    filetype: file
  /etc/tinyproxy.conf:
    exists: true
    filetype: file
  /usr/local/bin/microsocks:
    exists: true
    filetype: file
  /usr/local/bin/vpn-slice:
    exists: true
    filetype: file
  /usr/local/bin/fix-dns:
    exists: true
    mode: "0755"
    filetype: file
  /usr/local/bin/tunnel-gate.sh:
    exists: true
    mode: "0755"
    filetype: file

command:
  openconnect_version:
    exec: "openconnect --version"
    exit-status: 0
    stdout:
      - "/OpenConnect version/"
  tinyproxy_version:
    exec: "tinyproxy -v"
    exit-status: 0
  tinyproxy_port_config:
    exec: "grep '^Port 8888' /etc/tinyproxy.conf"
    exit-status: 0
    stdout:
      - "Port 8888"
  tunnel_gate_chain_exists:
    exec: "iptables -L OPENCONNECT_PROXY_GATE -n"
    exit-status: 0
  tunnel_gate_jump_rule_exists:
    exec: "iptables -C INPUT -m comment --comment openconnect-proxy-gate -j OPENCONNECT_PROXY_GATE"
    exit-status: 0
  tunnel_gate_reject_rule_present_at_start:
    exec: "iptables -C OPENCONNECT_PROXY_GATE -p tcp -m multiport --dports 8888,8889 -m comment --comment openconnect-proxy-gate -j REJECT --reject-with tcp-reset"
    exit-status: 0
  tunnel_gate_script_present:
    exec: "test -x /usr/local/bin/tunnel-gate.sh"
    exit-status: 0
