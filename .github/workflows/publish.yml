name: Publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: build/Dockerfile

      - name: ShellCheck entrypoint.sh
        run: shellcheck --shell=sh build/entrypoint.sh

  unit-tests:
    name: Unit Tests (BATS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Run BATS tests
        run: ./test/test_helper/bats-core/bin/bats test/unit/

  build-and-scan:
    name: Build & Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./build
          file: build/Dockerfile
          load: true
          tags: wazum/openconnect-proxy:test
          cache-from: type=gha,scope=build-test
          cache-to: type=gha,mode=max,scope=build-test

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: wazum/openconnect-proxy:test
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table

  container-tests:
    name: Container Structure Tests (goss)
    needs: build-and-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build image
        run: docker build -f build/Dockerfile -t wazum/openconnect-proxy:test ./build

      - name: Install goss/dgoss
        run: curl -fsSL https://goss.rocks/install | sh

      - name: Run container structure tests
        run: |
          cd test
          dgoss run --privileged --cap-add NET_ADMIN wazum/openconnect-proxy:test

  integration:
    name: Integration Tests
    needs: build-and-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Start test environment
        run: docker compose -f test/integration/docker-compose.test.yml up --build -d

      - name: Wait for test-runner to complete
        run: |
          timeout 120 docker wait test-runner
          EXIT_CODE=$(docker inspect test-runner --format='{{.State.ExitCode}}')
          docker logs test-runner
          echo "test-runner exit code: $EXIT_CODE"
          [ "$EXIT_CODE" = "0" ]

      - name: Show logs on failure
        if: failure()
        run: docker compose -f test/integration/docker-compose.test.yml logs

      - name: Tear down
        if: always()
        run: docker compose -f test/integration/docker-compose.test.yml down -v --remove-orphans

  publish:
    name: Publish Docker Image
    needs: [lint, unit-tests, build-and-scan, container-tests, integration]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: wazum/openconnect-proxy
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: ./build
          file: build/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=publish
          cache-to: type=gha,mode=max,scope=publish
