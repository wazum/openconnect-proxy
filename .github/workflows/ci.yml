name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 6 * * 1' # Every Monday 06:00 UTC

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: build/Dockerfile

      - name: ShellCheck shell scripts
        run: shellcheck --shell=sh build/entrypoint.sh build/tunnel-gate.sh

  unit-tests:
    name: Unit Tests (BATS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Run BATS tests
        run: ./test/test_helper/bats-core/bin/bats test/unit/

  build-and-scan:
    name: Build & Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: ./build
          file: build/Dockerfile
          load: true
          tags: wazum/openconnect-proxy:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: wazum/openconnect-proxy:test
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table

  container-tests:
    name: Container Structure Tests (goss)
    needs: build-and-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build image
        run: docker build -f build/Dockerfile -t wazum/openconnect-proxy:test ./build

      - name: Install goss/dgoss
        env:
          GOSS_VERSION: v0.4.9
        run: |
          curl -fsSLO "https://github.com/goss-org/goss/releases/download/${GOSS_VERSION}/goss-linux-amd64"
          curl -fsSLO "https://github.com/goss-org/goss/releases/download/${GOSS_VERSION}/goss-linux-amd64.sha256"
          curl -fsSLO "https://github.com/goss-org/goss/releases/download/${GOSS_VERSION}/dgoss"
          curl -fsSLO "https://github.com/goss-org/goss/releases/download/${GOSS_VERSION}/dgoss.sha256"
          sha256sum --check goss-linux-amd64.sha256
          sha256sum --check dgoss.sha256
          sudo install -m 0755 goss-linux-amd64 /usr/local/bin/goss
          sudo install -m 0755 dgoss /usr/local/bin/dgoss

      - name: Run container structure tests
        run: |
          cd test
          dgoss run --privileged --cap-add NET_ADMIN wazum/openconnect-proxy:test

  integration:
    name: Integration Tests
    needs: build-and-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run integration tests
        run: bash test/integration/run.sh

      - name: Show logs on failure
        if: failure()
        run: docker compose -f test/integration/docker-compose.test.yml logs

      - name: Tear down
        if: always()
        run: docker compose -f test/integration/docker-compose.test.yml down -v --remove-orphans

  weekly-freshness:
    name: Weekly Freshness Check
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build image from scratch
        run: docker build --no-cache -f build/Dockerfile -t wazum/openconnect-proxy:weekly ./build

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: wazum/openconnect-proxy:weekly
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table
